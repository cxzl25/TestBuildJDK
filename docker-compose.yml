# Usage:
#   docker compose build                                       # Build with defaults (jdk-25+11, server)
#   docker compose build --build-arg JDK_REPO=https://github.com/example/jdk.git  # Build from a custom repo
#   docker compose build --build-arg JDK_REF=jdk-25+12         # Build a specific JDK tag
#   docker compose build --build-arg BUILD_VARIANT=minimal      # Build minimal variant
#
# After build, extract the artifact:
#   docker compose up
#   # The tarball will be available in ./output/jdk25-linux-x64-<commit>.tar.gz

services:
  jdk25-builder:
    build:
      context: ./docker/jdk25-linux-x64
      dockerfile: Dockerfile
      args:
        JDK_REPO: ${JDK_REPO:-https://github.com/openjdk/jdk.git}
        JDK_REF: ${JDK_REF:-jdk-25+11}
        BUILD_VARIANT: ${BUILD_VARIANT:-server}
    volumes:
      - ./output:/output
    command: >
      sh -c "cp /build/jdk25-linux-x64-*.tar.gz /output/ &&
             echo 'JDK 25 tarball copied to ./output/'"
